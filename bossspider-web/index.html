<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BossFlow</title>
    <script>
      (function () {
        var key = 'bossflow-theme-mode';
        var mode = 'system';
        try {
          var saved = localStorage.getItem(key);
          if (saved === 'system' || saved === 'dark' || saved === 'light') mode = saved;
        } catch (_) {}
        var resolved = mode === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        var root = document.documentElement;
        root.dataset.themeMode = mode;
        root.dataset.theme = resolved;
        root.classList.toggle('dark', resolved === 'dark');
        root.style.colorScheme = resolved;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234f46e5'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='16' font-family='sans-serif'%3EBS%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
